    <path d="M62 26
             C 88 26 104 48 100 72
             C 96 96 72 110 52 104
             C 28 97 18 70 30 48
             C 38 33 48 26 62 26 Z" fill="#C84777"/>
    <path d="M62 26
             C 84 28 98 50 94 70
             C 90 90 70 102 54 98" fill="#FF6B4A" opacity="0.85"/>
    <!-- blush highlight -->
    <ellipse cx="48" cy="56" rx="12" ry="18" fill="#FFB627" opacity="0.7" transform="rotate(-20 48 56)"/>
    <ellipse cx="42" cy="48" rx="4" ry="7" fill="#FFF4E0" opacity="0.8" transform="rotate(-25 42 48)"/>
