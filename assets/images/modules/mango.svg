    <path d="M64 20 Q86 8 96 22 Q82 34 64 24 Z" fill="#2E8B6A"/>
    <path d="M66 22 Q82 16 92 22" fill="none" stroke="#D8F0E2" stroke-width="2" stroke-linecap="round"/>
