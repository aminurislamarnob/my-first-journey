<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- friendly lion face -->
  <g>
    <!-- mane -->
    <circle cx="60" cy="60" r="46" fill="#E8902A"/>
    <circle cx="60" cy="60" r="46" fill="none" stroke="#C8741C" stroke-width="3" stroke-dasharray="10 7"/>
    <!-- ears -->
    <circle cx="30" cy="32" r="10" fill="#FFB627"/>
    <circle cx="90" cy="32" r="10" fill="#FFB627"/>
    <!-- face -->
    <circle cx="60" cy="62" r="32" fill="#FFB627"/>
    <!-- eyes -->
    <circle cx="48" cy="55" r="4.5" fill="#1A1530"/>
    <circle cx="72" cy="55" r="4.5" fill="#1A1530"/>
    <circle cx="49.5" cy="53.5" r="1.5" fill="#FFFCF5"/>
    <circle cx="73.5" cy="53.5" r="1.5" fill="#FFFCF5"/>
    <!-- muzzle -->
    <ellipse cx="60" cy="74" rx="14" ry="11" fill="#FFF4E0"/>
    <path d="M60 68 L55 74 Q60 79 65 74 Z" fill="#C8741C"/>
    <!-- smile -->
    <path d="M52 80 Q60 87 68 80" fill="none" stroke="#1A1530" stroke-width="2.5" stroke-linecap="round"/>
    <!-- whisker dots -->
    <circle cx="44" cy="74" r="1.5" fill="#C8741C"/>
    <circle cx="41" cy="79" r="1.5" fill="#C8741C"/>
    <circle cx="76" cy="74" r="1.5" fill="#C8741C"/>
    <circle cx="79" cy="79" r="1.5" fill="#C8741C"/>
  </g>
</svg>
